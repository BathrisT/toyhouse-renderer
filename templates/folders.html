<!--
  ШАБЛОН: Протокол 0 — папки (навигационная сетка разделов).
  Отдельный самостоятельный виджет (не карточка персонажа) — сетка кликабельных
  плиток-"секторов", обычно ссылки на подгалереи/разделы. Не путать с character_page —
  этот вставляется отдельно, где нужен такой навигационный блок. Любое число плиток
  через {{#each папки}}.

  Дизайн — не классический "тёмное фото + иконка поверх" паттерн (см. examples_from_toyhouse/
  13_folders.html), а переиспользование СВОЕГО же приёма: светлая ID-карточка с угловыми
  скобками, как у карточки ID в "Досье" character_page.html, плюс код сектора SC-0N —
  та же логика нумерации, что у ID персонажа (PR0-88214-С) и мира (АРКТУР-9). Картинка —
  маленькое опциональное превью сбоку, а не доминирующий фон: так виджет читается как
  часть архива "Протокола 0", а не как отдельный фотоальбом.

  Платформенная безопасность: контент — в обычном <div>, кликабельность — через
  завершающую пустую <a class="stretched-link"> (блочные элементы внутри <a> шинкует
  санитайзер Тойхауза, см. КРИТИЧНО #3 в возможности_и_ограничения.md); картинка —
  обычный <img>, не составной background, поэтому КРИТИЧНО #2 тут вообще не применимо.

  Вставляется в поле "Folder Description" конкретной папки (не в био персонажа), с
  выключенным WYSIWYG — та же механика, что и у обычного био. Это НЕ переопределение
  стилей нативного списка персонажей внутри папки (то отдельная штука — "Folder CSS",
  судя по форумам Тойхауза, требует Premium) — см. 3.10 в возможности_и_ограничения.md.

  Синтаксис плейсхолдеров — в templates/README.md.
-->
<div id="protocol0-folders" style="
  --void:#ffffff; --panel2:#ffffff;
  --edge:rgba(15,23,42,.10); --edge2:rgba(15,23,42,.16);
  --signal:#0089a3; --signal-dim:rgba(0,137,163,.08);
  --ink:#12161f; --mute:#5c6472; --dim:#8b93a1;
  --mono:'Consolas','SFMono-Regular','Cascadia Code',monospace;
  --sans:'Segoe UI',-apple-system,'Helvetica Neue',Arial,sans-serif;
  background:var(--void); font-family:var(--sans); max-width:1000px; margin:0 auto; -webkit-font-smoothing:antialiased;">

  <div style="font-family:var(--mono); font-size:10.5px; letter-spacing:2px; color:var(--dim); margin-bottom:10px;">{{заголовок=// СЕКТОРА}}</div>

  <div class="row no-gutters">
    {{#each папки}}
    <div class="col-6 col-md-4 p-1">
      <div style="position:relative; display:flex; align-items:center; height:100%; padding:10px 14px 10px 10px; background:var(--panel2); border:1px solid var(--edge2); border-radius:8px;">
        <div style="position:absolute; top:-1px; left:-1px; width:12px; height:12px; border-top:2px solid var(--signal); border-left:2px solid var(--signal);"></div>
        <div style="position:absolute; bottom:-1px; right:-1px; width:12px; height:12px; border-bottom:2px solid var(--signal); border-right:2px solid var(--signal);"></div>

        {{#картинка_url}}
        <img src="{{картинка_url~https://placehold.co/80x80}}" style="width:42px; height:42px; border-radius:6px; object-fit:cover; flex:0 0 auto; margin-right:12px; background:var(--signal-dim);">
        {{/картинка_url}}

        <div style="min-width:0;">
          <div style="font-family:var(--mono); font-size:10px; letter-spacing:1px; color:var(--dim);">SC-0{{@index}}</div>
          <div class="d-flex align-items-center" style="margin-top:2px;">
            <i class="{{иконка|icon~fa-solid fa-folder}} mr-2" style="color:var(--signal); font-size:12.5px; flex:0 0 auto;"></i>
            <div style="font-size:13.5px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{название~Название}}</div>
          </div>
        </div>

        <a href="{{ссылка|url}}" class="stretched-link"></a>
      </div>
    </div>
    {{/each}}
  </div>
</div>
